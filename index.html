<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0c0d10" />
  <title>Castles Bay · Escritório de Comunicação</title>
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('castlesbay-theme') || 'dark');</script>
  <div class="ambient" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="water" aria-hidden="true"><canvas id="water-canvas"></canvas></div>
  <div id="app">
    <!-- Coluna da torre: céu (muda com a hora) + torre -->
    <div class="tower-col">
      <div class="sky" aria-hidden="true"><canvas id="sky-canvas"></canvas></div>
      <aside class="rail">
      <div class="wordmark">
        <div class="wordmark-mark">CB</div>
        <div class="wordmark-text">
          <strong>Castles Bay</strong>
        </div>
      </div>

      <nav class="nav" id="nav">
        <span class="nav-indicator" aria-hidden="true"></span>
        <button class="nav-item" data-view="dashboard">
          <span class="nav-ico" aria-hidden="true">◧</span>
          <span>Painel</span>
        </button>
        <button class="nav-item" data-view="calendar">
          <span class="nav-ico" aria-hidden="true">▦</span>
          <span>Calendário</span>
        </button>
        <button class="nav-item" data-view="ideas">
          <span class="nav-ico" aria-hidden="true">✦</span>
          <span>Ideias</span>
        </button>
        <button class="nav-item" data-view="tasks">
          <span class="nav-ico" aria-hidden="true">▸</span>
          <span>Tarefas</span>
        </button>
      </nav>

      <div class="rail-section">
        <div class="rail-section-head">
          <span>Categorias</span>
          <button id="add-category-btn" class="icon-btn" title="Nova categoria" aria-label="Nova categoria">＋</button>
        </div>
        <ul id="category-list" class="category-list"></ul>
      </div>

      <div class="rail-foot">
        <button id="sync-btn" class="sync-status" title="Sincronização">
          <span class="sync-dot" aria-hidden="true"></span>
          <span id="sync-label">Só neste dispositivo</span>
        </button>
        <div class="rail-tools">
          <button id="theme-toggle" class="ghost-btn" title="Alternar tema claro/escuro">Tema claro</button>
          <button id="export-btn" class="ghost-btn" title="Guardar cópia de segurança">Exportar</button>
          <button id="import-btn" class="ghost-btn" title="Restaurar cópia de segurança">Importar</button>
          <input type="file" id="import-file" accept="application/json" hidden />
        </div>
        <div class="rail-user">
          <span id="rail-user-name" class="rail-user-name"></span>
          <button id="logout-btn" class="ghost-btn" title="Terminar sessão">Sair</button>
        </div>
      </div>
    </aside>
    </div>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow" id="view-eyebrow">Planeamento</span>
          <h1 id="view-title">Calendário</h1>
        </div>
        <div class="topbar-actions">
          <label class="search">
            <span class="search-ico" aria-hidden="true">⌕</span>
            <input type="search" id="search-input" placeholder="Pesquisar…" aria-label="Pesquisar" autocomplete="off" />
          </label>
          <label class="filter">
            <span class="filter-label">Categoria</span>
            <select id="category-filter" aria-label="Filtrar por categoria">
              <option value="all">Todas</option>
            </select>
          </label>
          <button id="primary-action" class="primary-btn">Novo post</button>
        </div>
      </header>

      <section id="view-container" class="view-container"></section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title">Título</h2>
        <button id="modal-close" class="icon-btn" aria-label="Fechar">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="Imagem do post" />
  </div>

  <div id="toast" class="toast" hidden></div>

  <!-- Ecrã de entrada -->
  <div id="login" class="login-screen" hidden>
    <form id="login-form" class="login-card" autocomplete="off">
      <div class="login-mark">CB</div>
      <div class="login-title">Castles Bay</div>
      <div class="login-sub">Escritório de Comunicação</div>
      <label class="login-field"><span>Utilizador</span>
        <input type="text" id="login-user" autocapitalize="none" autocomplete="username" placeholder="admin ou convidado" />
      </label>
      <label class="login-field"><span>Palavra-passe</span>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" />
      </label>
      <div id="login-error" class="login-error" hidden>Utilizador ou palavra-passe incorretos.</div>
      <button type="submit" class="primary-btn login-btn">Entrar</button>
    </form>
  </div>

  <!-- Firebase SDK (compat) — sincronização entre dispositivos.
       Sem rede/config, a app funciona só neste dispositivo. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="config.js" onerror="void 0"></script>

  <script src="app.js"></script>
</body>
</html>
